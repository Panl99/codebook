syntax = "proto3";

package com.lp.iot.v1.common;

// ============================================================================
// 设备通用状态信息 - 设备健康和运行状态的标准化描述
//
// 设计目的：
// 1. 设备健康监控：电池电量、信号强度等关键指标
// 2. 运维管理：固件版本、运行时长等设备信息
// 3. 网络优化：根据网络类型和信号质量调整传输策略
//
// 对标标准：
// - AWS IoT Device Shadow: reported.state 中的设备状态字段
// - Azure IoT Hub Device Twin: tags 中的设备元数据
// - 阿里云 IoT Platform: 物模型属性（battery、rssi等）
// ============================================================================
message DeviceStatus {
  // 设备唯一标识符
  // 格式：IMEI、MAC地址、SN序列号或自定义ID
  // 示例："device-001" 或 "356938035643809" (IMEI)
  string device_id = 1;

  // 电池电量百分比
  // 范围：0-100
  // 用途：低电量告警、功耗优化、充电提醒
  // 注意：对于有线供电设备，此字段可固定为100或忽略
  uint32 battery = 2;

  // 信号强度指示（RSSI - Received Signal Strength Indicator）
  // 单位：dBm（分贝毫瓦）
  // 范围：典型值 -30dBm（极强）到 -120dBm（极弱）
  // 参考：
  //   -30 ~ -50 dBm: 优秀信号
  //   -50 ~ -70 dBm: 良好信号
  //   -70 ~ -90 dBm: 一般信号
  //   < -90 dBm:     弱信号，可能需要优化天线或位置
  int32 rssi = 3;

  // 设备连续运行时长
  // 单位：秒
  // 用途：设备稳定性评估、定期重启策略、 uptime 监控
  // 示例：86400 = 运行了24小时
  uint32 uptime_seconds = 4;

  // 网络连接类型
  // 可选值："WiFi"、"4G"、"5G"、"NB-IoT"、"LoRa"、"Ethernet"、"Bluetooth"
  // 用途：根据网络类型调整传输频率和数据量
  // 示例：NB-IoT 网络应减少传输频次以节省流量
  string network_type = 5;

  // 固件版本号
  // 格式：语义化版本 "major.minor.patch"
  // 示例："1.2.3" 或 "v2.0.1-beta"
  // 用途：固件升级管理、版本兼容性检查、灰度发布
  string firmware_version = 6;
}
