syntax = "proto3";

package com.lp.iot.v1.upload;

import "google/protobuf/timestamp.proto";

// ============================================================================
// 单个传感器数据点 - 标准化的传感器读数结构
//
// 设计目的：
// 1. 统一数据格式：不同厂商传感器的数据结构化表达
// 2. 元数据完整：包含单位、时间戳、数据质量等上下文信息
// 3. 扩展性强：通过 sensor_type 支持任意类型的传感器
//
// 对标标准：
// - SensorML (Sensor Model Language): OGC 传感器建模标准
// - IPSO Smart Objects: LWM2M 对象模型
// - AWS IoT SiteWise: 资产属性数据模型
// ============================================================================
message SensorDataPoint {
  // 传感器类型标识
  // 推荐命名规范：<物理量>_<测量方式>
  // 示例："temperature_dht22"、"pressure_bmp280"、"gps_neo6m"
  // 用途：区分同一设备的多个同类型传感器
  string sensor_type = 1;

  // 传感器测量值
  // 类型：double（支持高精度浮点数）
  // 单位：由 unit 字段定义
  // 示例：25.5（温度）、60.2（湿度）、1013.25（气压）
  double value = 2;

  // 测量单位（采用国际单位制 SI）
  // 温度："°C"（摄氏度）、"K"（开尔文）
  // 湿度："%RH"（相对湿度）
  // 气压："hPa"（百帕）、"Pa"（帕斯卡）
  // 光照："lux"（勒克斯）
  // 距离："m"（米）、"cm"（厘米）
  // 速度："m/s"（米每秒）、"km/h"（千米每小时）
  string unit = 3;

  // 数据采集时间戳（UTC时间）
  // 精度：纳秒级
  // 用途：
  // 1. 时序数据库存储（InfluxDB、TimescaleDB）
  // 2. 数据对齐和多传感器融合
  // 3. 历史数据回溯和分析
  google.protobuf.Timestamp collection_timestamp = 4;

  // 数据质量指标
  // 范围：0-100
  // 含义：
  //   100: 数据完全可信
  //   80-99: 数据可信，可能存在轻微误差
  //   50-79: 数据仅供参考
  //   < 50: 数据不可信，建议丢弃
  // 影响因素：传感器校准状态、信号干扰、环境异常等
  uint32 quality = 5;
}

// ============================================================================
// 传感器数据载荷 - 设备上报的核心业务数据
//
// 设计目的：
// 1. 结构化数据：预定义常用字段（温度、湿度、气压）
// 2. 历史数据支持：history_temperatures 用于趋势分析
// 3. 动态扩展：extended_sensors 支持任意数量的额外传感器
//
// 使用场景：
// - 环境监测：温湿度、气压、空气质量
// - 工业监控：设备温度、振动、压力
// - 智能家居：室内环境参数采集
// ============================================================================
message SensorData {
  // 环境温度
  // 单位：摄氏度（°C）
  // 精度：小数点后1-2位
  // 示例：25.5
  double temperature = 1;

  // 环境湿度
  // 单位：相对湿度百分比（%RH）
  // 范围：0-100
  // 示例：60.2
  double humidity = 2;

  // 大气压力
  // 单位：百帕（hPa）
  // 典型值：海平面约1013.25 hPa
  // 示例：1013.25
  double pressure = 3;

  // 历史温度数据（最近N次采样）
  // 用途：
  // 1. 趋势分析：判断温度变化方向
  // 2. 异常检测：识别温度突变
  // 3. 减少传输频次：批量上报替代逐次上报
  // 示例：[25.1, 25.3, 25.5, 25.4, 25.5]（最近5次采样）
  repeated double history_temperatures = 4;

  // 扩展传感器数据（键值对映射）
  // Key: 传感器类型标识（如 "light_sensor"、"co2_sensor"）
  // Value: 传感器数据点（包含值、单位、时间戳等）
  // 用途：支持动态添加新传感器，无需修改协议结构
  // 示例：
  //   "light_sensor": { value: 500, unit: "lux", ... }
  //   "co2_sensor": { value: 450, unit: "ppm", ... }
  map<string, SensorDataPoint> extended_sensors = 5;
}

// ============================================================================
// 批量传感器数据 - 高效的历史数据传输方案
//
// 设计目的：
// 1. 网络优化：批量传输减少HTTP/MQTT连接开销
// 2. 离线缓存：网络中断时本地存储，恢复后批量上传
// 3. 时序完整性：batch_start_time 和 batch_end_time 界定数据范围
//
// 使用场景：
// - NB-IoT/LoRa 等低功耗广域网（LPWAN）
// - 网络不稳定地区的断点续传
// - 历史数据补传和同步
//
// 性能优势：
// - 相比逐条上报，可减少 60-80% 的网络开销
// - Protobuf + gzip 压缩后，压缩率可达 80-90%
// ============================================================================
message BatchSensorData {
  // 传感器数据点列表
  // 建议批量大小：50-500条（根据网络条件和内存限制调整）
  // 注意：避免单次批量过大导致内存溢出或传输超时
  repeated SensorDataPoint data_points = 1;

  // 批次唯一标识符
  // 格式：UUID 或 "batch_<timestamp>_<sequence>"
  // 用途：批次去重、断点续传、进度追踪
  // 示例："batch-20260512-001"
  string batch_id = 2;

  // 批次起始时间（UTC）
  // 含义：本批次中最早的数据点时间
  // 用途：时序数据库批量写入的时间范围界定
  google.protobuf.Timestamp batch_start_time = 3;

  // 批次结束时间（UTC）
  // 含义：本批次中最晚的数据点时间
  // 用途：计算批次时间跨度，验证数据完整性
  google.protobuf.Timestamp batch_end_time = 4;
}
