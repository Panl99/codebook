syntax = "proto3";

package com.lp.iot.v1.command;

// ============================================================================
// 配置更新参数 - 云平台动态调整设备运行参数
//
// 设计目的：
// 1. 远程配置：无需物理接触即可修改设备参数
// 2. 灵活适配：根据不同场景调整设备行为
// 3. 批量管理：同时更新大量设备的配置
//
// 使用场景：
// - 调整数据采集频率（如从10秒改为60秒）
// - 修改告警阈值（如温度上限从80°C调整为85°C）
// - 启用/禁用特定功能（如开启批量上传）
// - 优化网络策略（如调整重连间隔）
//
// 对标标准：
// - AWS IoT Device Shadow: desired.state 中的配置字段
// - Azure IoT Hub Device Twin: desired properties
// - 阿里云 IoT Platform: 远程配置功能
// ============================================================================
message ConfigUpdate {
  // 数据上报间隔
  // 单位：秒
  // 范围：建议 10-3600秒（10秒到1小时）
  // 示例：
  //   10:  高频采集（实时监控场景）
  //   60:  正常采集（常规监测场景）
  //   300: 低频采集（低功耗场景）
  // 注意：过短的上报间隔会增加网络流量和设备功耗
  uint32 report_interval_sec = 1;

  // 温度告警阈值（上限）
  // 单位：摄氏度（°C）
  // 用途：当温度超过此阈值时触发告警事件
  // 示例：80.0（工业设备）、40.0（室内环境）
  // 注意：应根据设备规格和应用场景合理设置
  double temperature_threshold = 2;

  // 湿度告警阈值（上限）
  // 单位：相对湿度百分比（%RH）
  // 用途：当湿度超过此阈值时触发告警事件
  // 示例：80.0（仓库防潮）、60.0（电子设备间）
  double humidity_threshold = 3;

  // 是否启用批量上传
  // true:  启用批量上传（适合网络不稳定或低功耗场景）
  // false: 禁用批量上传（实时性要求高的场景）
  // 优势：批量上传可减少60-80%的网络开销
  // 注意：启用后需配置 batch_max_size 和 batch_timeout
  bool enable_batch_upload = 4;

  // 批量上传最大条目数
  // 范围：建议 10-500条
  // 含义：累积到此数量时自动触发批量上传
  // 示例：
  //   50:  平衡实时性和效率
  //   100: 偏向效率（适合NB-IoT等低带宽网络）
  //   10:  偏向实时性（适合WiFi/4G等高带宽网络）
  // 注意：需权衡内存占用和传输效率
  uint32 batch_max_size = 5;
}
