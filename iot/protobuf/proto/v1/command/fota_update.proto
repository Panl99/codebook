syntax = "proto3";

package com.lp.iot.v1.command;

// ============================================================================
// 固件升级参数（FOTA - Firmware Over-The-Air）- 远程固件升级指令
//
// 设计目的：
// 1. 远程升级：无需物理接触即可更新设备固件
// 2. 完整性校验：通过MD5校验确保固件未被篡改或损坏
// 3. 升级策略：支持强制升级和可选升级两种模式
//
// 使用场景：
// - Bug修复：修复已知软件缺陷
// - 功能迭代：新增功能或优化现有功能
// - 安全补丁：修复安全漏洞
// - 协议升级：支持新的通信协议版本
//
// 安全考虑：
// - 固件URL应使用HTTPS加密传输
// - MD5校验防止固件被篡改或下载不完整
// - 建议增加数字签名验证（可在result_data中扩展）
// - 升级前应备份当前固件，支持回滚
//
// 对标标准：
// - AWS IoT Jobs: FOTA升级任务管理
// - Azure IoT Device Update: 设备更新服务
// - LWM2M Firmware Update Object (Object ID 5)
// ============================================================================
message FotaUpdate {
  // 目标固件版本号
  // 格式：语义化版本 "major.minor.patch"
  // 示例："2.0.0"、"1.3.5-beta"
  // 用途：
  // 1. 版本比对：设备判断是否需要升级
  // 2. 升级记录：记录升级历史和当前版本
  // 3. 兼容性检查：确保固件与硬件兼容
  string target_version = 1;

  // 固件下载地址（URL）
  // 协议：强烈建议使用 HTTPS（防止中间人攻击）
  // 示例："https://firmware.example.com/v2.0.0/device_firmware.bin"
  // 注意：
  // - URL应具有时效性（如预签名URL，有效期1-24小时）
  // - 支持断点续传（HTTP Range请求）
  // - 大文件建议使用CDN加速下载
  string firmware_url = 2;

  // 固件MD5校验码
  // 格式：32位十六进制字符串
  // 示例："d41d8cd98f00b204e9800998ecf8427e"
  // 用途：
  // 1. 完整性校验：下载完成后计算MD5并与该校验码比对
  // 2. 防篡改：确保固件未被恶意修改
  // 3. 去重：相同MD5的固件无需重复下载
  // 安全建议：
  // - 生产环境建议使用SHA256（更安全）
  // - 可增加数字签名验证（RSA/ECDSA）
  string md5_checksum = 3;

  // 固件文件大小
  // 单位：字节（Bytes）
  // 用途：
  // 1. 存储空间检查：设备判断是否有足够空间存储固件
  // 2. 下载进度计算：已下载字节 / 总字节 = 进度百分比
  // 3. 传输时间估算：文件大小 / 网络带宽 = 预计下载时间
  // 示例：
  //   1048576 = 1MB（小型嵌入式设备）
  //   10485760 = 10MB（中型智能设备）
  //   104857600 = 100MB（大型网关设备）
  uint64 firmware_size = 4;

  // 是否强制升级
  // true:  强制升级（设备必须执行，不可拒绝）
  //        适用场景：严重安全漏洞、关键Bug修复
  // false: 可选升级（设备可根据当前状态决定是否升级）
  //        适用场景：功能优化、非紧急改进
  // 注意：
  // - 强制升级前应确保设备电量充足（>30%）
  // - 强制升级可能导致设备暂时不可用（升级期间）
  // - 建议提供升级窗口期（如凌晨2-4点）
  bool force_update = 5;
}
